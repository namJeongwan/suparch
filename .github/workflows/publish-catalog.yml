name: Publish DSLD catalog

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type PUBLISH to release the complete on-market catalog
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-dsld-catalog
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: catalog-production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Validate publication request
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "catalog publication must run from main" >&2
            exit 1
          fi
          if [ "$CONFIRMATION" != "PUBLISH" ]; then
            echo "confirmation must be PUBLISH" >&2
            exit 1
          fi
      - run: uv sync --frozen
      - name: Build complete on-market DSLD snapshot
        run: |
          uv run suparch-catalog dsld-sync \
            --query "*" \
            --status on-market \
            --limit 0 \
            --page-size 100 \
            --workers 8 \
            --no-resume \
            --output build/dsld-products.jsonl \
            --database build/suparch-catalog.sqlite
      - run: >-
          uv run suparch-catalog verify
          --database build/suparch-catalog.sqlite
      - name: Gate official catalog size
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(
              Path("build/suparch-catalog.sqlite.manifest.json").read_text()
          )
          if manifest["product_count"] < 50_000:
              raise SystemExit(
                  f"refusing to publish only {manifest['product_count']} products"
              )
          PY
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: suparch-catalog-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            build/suparch-catalog.sqlite
            build/suparch-catalog.sqlite.sha256
            build/suparch-catalog.sqlite.manifest.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish immutable release and advance pointer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CATALOG_TAG="catalog-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          CATALOG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${CATALOG_TAG}/suparch-catalog.sqlite"
          CATALOG_SHA="$(cut -d ' ' -f 1 build/suparch-catalog.sqlite.sha256)"
          SCHEMA_VERSION="$(
            jq -r .schema_version build/suparch-catalog.sqlite.manifest.json
          )"
          POINTER_PATH="v${SCHEMA_VERSION}/catalog-pointer.json"

          gh release create "$CATALOG_TAG" \
            --target "$GITHUB_SHA" \
            --title "Suparch catalog ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --notes "Immutable NIH DSLD snapshot from workflow run ${GITHUB_RUN_ID}, attempt ${GITHUB_RUN_ATTEMPT}." \
            --prerelease
          gh release upload "$CATALOG_TAG" \
            build/suparch-catalog.sqlite \
            build/suparch-catalog.sqlite.sha256 \
            build/suparch-catalog.sqlite.manifest.json

          curl --fail --location \
            --retry 10 --retry-all-errors --retry-delay 3 \
            "$CATALOG_URL" \
            --output build/public-suparch-catalog.sqlite
          echo "$CATALOG_SHA  build/public-suparch-catalog.sqlite" \
            | sha256sum --check -
          uv run suparch-catalog verify \
            --database build/public-suparch-catalog.sqlite

          jq -n \
            --arg catalog_url "$CATALOG_URL" \
            --arg sha256 "$CATALOG_SHA" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
            --argjson schema_version "$SCHEMA_VERSION" \
            --arg source_sha "$GITHUB_SHA" \
            '{
              catalog_url: $catalog_url,
              sha256: $sha256,
              run_id: $run_id,
              run_attempt: $run_attempt,
              schema_version: $schema_version,
              source_sha: $source_sha
            }' > build/catalog-pointer.json

          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/catalog" \
            >/dev/null 2>&1; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/heads/catalog" \
              -f sha="$GITHUB_SHA"
          fi

          CURRENT_SHA="$(
            gh api "repos/${GITHUB_REPOSITORY}/contents/${POINTER_PATH}?ref=catalog" \
              --jq .sha 2>/dev/null || true
          )"
          POINTER_CONTENT="$(base64 -w 0 build/catalog-pointer.json)"
          if [ -n "$CURRENT_SHA" ]; then
            gh api --method PUT \
              "repos/${GITHUB_REPOSITORY}/contents/${POINTER_PATH}" \
              -f branch=catalog \
              -f message="chore(catalog): publish ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              -f content="$POINTER_CONTENT" \
              -f sha="$CURRENT_SHA"
          else
            gh api --method PUT \
              "repos/${GITHUB_REPOSITORY}/contents/${POINTER_PATH}" \
              -f branch=catalog \
              -f message="chore(catalog): publish ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              -f content="$POINTER_CONTENT"
          fi
