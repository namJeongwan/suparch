name: Release image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish (for example, 0.3.0)"
        required: true
        type: string
      promote_aliases:
        description: "Also update the minor and latest tags"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || github.ref }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        name: Compute image metadata
        env:
          INPUT_VERSION: ${{ inputs.version }}
          PROMOTE_ALIASES: ${{ inputs.promote_aliases }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION:-${GITHUB_REF_NAME#v}}"
          number='(0|[1-9][0-9]*)'
          identifier='(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)'
          semver="^${number}\.${number}\.${number}(-${identifier}(\.${identifier})*)?$"
          if [[ ! "$version" =~ $semver ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/$owner/suparch"
          revision="$(git rev-parse HEAD)"
          {
            echo "version=$version"
            echo "revision=$revision"
            echo "tags<<EOF"
            echo "$image:$version"
            if [[ "$version" != *-* && "$PROMOTE_ALIASES" == "true" ]]; then
              echo "$image:${version%.*}"
              echo "$image:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.metadata.outputs.revision }}
            org.opencontainers.image.version=${{ steps.metadata.outputs.version }}
